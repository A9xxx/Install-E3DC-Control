name: Release E3DC-Control Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    # HIER: Schreibrechte explizit vergeben
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Create ZIP artifact
        run: |
          # Versionsnummer aus Tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "$VERSION" > VERSION

          # Release-Struktur
          mkdir -p Install-E3DC-Control/Install

          # Repo-Inhalt in Install/ kopieren (ohne .git und .github)
          rsync -a --exclude '.git' --exclude '.github' --exclude '__pycache__' --exclude '.vscode' --exclude '.idea' --exclude '.gitignore' --exclude '.gitattributes' --exclude '.DS_Store' ./ Install-E3DC-Control/Install/

          # JSON-Bereinigung (außer manifest.json), um keine lokalen Configs zu shippen
          find Install-E3DC-Control/Install/ -name "*.json" ! -name "manifest.json" -type f -delete
          
          # ZIP erstellen
          zip -r Install-E3DC-Control.zip Install-E3DC-Control/
          ls -lh Install-E3DC-Control.zip
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Generate Release Notes from Changelog
        id: notes
        run: |
          notes=$(python3 pi/release.py --get-notes ${{ steps.version.outputs.version }})
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "${notes}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Version ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            Install-E3DC-Control.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
